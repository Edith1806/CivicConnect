# ===============================
# DATABASE (MariaDB)
# ===============================
# ===============================
# DATABASE (MariaDB Docker)
# ===============================

spring.datasource.url=jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3307}/civicconnectdb
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# JPA / HIBERNATE
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MariaDBDialect
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.web.filter=DEBUG

# ⚠️ DO NOT add schema_management_tool
# ⚠️ DO NOT add SchemaManagementToolImpl

# ===============================
# MAIL (Gmail App Password)
# ===============================
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=vpriincy@gmail.com
spring.mail.password=***REMOVED***
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# File upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=20MB

# Image storage path
app.upload.dir=uploads/issues
app.jwt.refresh-expiration-ms=604800000  
app.jwt.secret=ThisIsASecretKeyForCivicConnectApplication123456
app.jwt.expiration-ms=900000
