version: '3.9'

services:

  frontend:
    build: ./frontend/civicconnect-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

  backend:
    build: .
    restart : on-failure
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
    depends_on:
      - mariadb

  mariadb:
    image: mariadb:11

    container_name: civicconnect-mariadb

    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: civicconnectdb

    ports:
      - "3307:3306"

    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: